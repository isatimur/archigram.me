name: Library Ingest

# Weekly scrape of public Mermaid diagrams from GitHub + Mermaid official docs
# + curated awesome-mermaid lists. Validates, dedupes, scores, enriches via
# Gemini, and opens a PR with new entries under data/library/ for human review.
#
# Migrated 2026-05-11 from a Supabase-targeted scraper to the new file-canonical
# library pipeline (scripts/discover-ingest/).

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday 6am UTC
  workflow_dispatch: # Manual trigger from Actions UI
    inputs:
      limit:
        description: 'Max candidates to ingest (default 100)'
        required: false
        default: '100'

permissions:
  contents: write
  pull-requests: write

jobs:
  ingest:
    name: Ingest Mermaid diagrams from the web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Install mermaid-cli (mmdc) for SVG rendering
        run: bun add -g @mermaid-js/mermaid-cli

      - name: Run library ingestion pipeline
        # Uses the workflow's auto-provided GITHUB_TOKEN (1000/hr, sufficient for
        # code search + repo metadata; lacks gist scope so the gist source stage
        # will 401/403 and be skipped automatically thanks to the retry cap).
        # For 5000/hr throughput and gist access, set a LIBRARY_INGEST_TOKEN
        # repo secret with a PAT that has `public_repo` + `gist` scopes and add
        # `${{ secrets.LIBRARY_INGEST_TOKEN || secrets.GITHUB_TOKEN }}` below.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INGEST_LIMIT: ${{ github.event.inputs.limit || '100' }}
        timeout-minutes: 30
        run: |
          bun run scripts/discover-ingest/build-library.ts --prod --limit=$INGEST_LIMIT

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet --exit-code -- data/library/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new library diagrams ingested this run."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat -- data/library/
          fi

      - name: Open PR with new library diagrams
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'feat(library): weekly ingest from public sources'
          branch: library/auto-ingest
          delete-branch: true
          title: 'Library: weekly ingest from public sources'
          body: |
            Auto-generated by the **Library Ingest** workflow.

            This PR adds newly-ingested Mermaid diagrams scraped from public sources
            (GitHub code search, gists, awesome-mermaid lists, Mermaid official docs)
            after passing render validation, dedup, scoring, and Gemini enrichment.

            **Review checklist**
            - [ ] Spot-check 2-3 new files in `data/library/` for sensible AI commentary
            - [ ] Verify source URLs link to real public repos with licenses
            - [ ] Check `data/library/_review.md` for any flagged items needing manual gate
            - [ ] Run `bun run validate` locally if you change anything

            Hand-seeded diagrams are never overwritten; colliding slugs get suffixed `-2`, `-3`, etc.
          add-paths: |
            data/library/**
          labels: |
            automated
            library
